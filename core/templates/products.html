
    {% include "base.html" %}
    <h1 class="text-3xl font-bold mb-6">🛍️ All Products</h1>
    <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <script>
      //const token = localStorage.getItem("token");
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "/login/";
      }

      async function loadProducts() {
        const res = await fetch("/api/products/", {
          headers: {
            Authorization: "Bearer " + token,
          },
        });

        const container = document.getElementById("products");

        if (res.status === 401) {
          container.innerHTML = `<p class="text-red-600">Unauthorized. Please <a href='/login/' class="underline">login</a>.</p>`;
          return;
        }

        const products = await res.json();

        if (products.length === 0) {
          container.innerHTML = "<p>No products found.</p>";
          return;
        }

        products.forEach((product) => {
          container.innerHTML += `
        <div class="bg-white rounded shadow p-4">
          <img src="${product.image}" alt="${
            product.name
          }" class="w-full h-48 object-cover rounded mb-2">
          <h2 class="text-xl font-semibold">${product.name}</h2>
          <p>${product.description}</p>
          <p class="text-green-600 font-bold mt-2">₦${product.price}</p>
          <div class="mt-3 flex justify-between text-sm">
            <a href="/api/products/share/${
              product.id
            }/" class="text-blue-500 hover:underline">🔗 Share</a>
            <button onclick='likeProduct(${
              product.id
            })' class="text-red-500">❤️ Like</button>
            <button onclick='commentOnProduct(${
              product.id
            })' class="text-gray-500">💬 Comment</button>

            <button onclick='addToCart(${JSON.stringify(
              product
            )})' class="text-green-700 hover:underline">Add to Cart</button>
          </div>
        </div>
        `;
        });

        function addToCart(product) {
          const cart = JSON.parse(localStorage.getItem("cart") || "[]");
          cart.push(product);
          localStorage.setItem("cart", JSON.stringify(cart));
          alert("🛒 Added to cart!");
        }
      }

      async function likeProduct(productId) {
        const token = localStorage.getItem("token");
        const res = await fetch(`/api/products/${productId}/like/`, {
          method: "POST",
          headers: {
            Authorization: "Bearer " + token,
          },
        });
        const result = await res.json();
        alert(result.liked ? "❤️ Liked!" : "💔 Unliked");
      }

      async function commentOnProduct(productId) {
        const comment = prompt("Enter your comment:");
        const token = localStorage.getItem("token");

        const res = await fetch(`/api/products/${productId}/comment/`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify({ text: comment }),
        });

        const data = await res.json();
        if (res.ok) {
          alert("✅ Comment posted!");
        } else {
          alert("❌ Failed to comment.");
        }
      }

      loadProducts();
    </script>
