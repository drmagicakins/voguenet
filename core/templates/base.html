<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VogueNet</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <nav class="bg-white shadow p-4 flex justify-between">
      <a href="/" class="text-xl font-bold">👗 VogueNet</a>
      <div id="navLinks" class="space-x-4">
        <a href="/register/" class="text-blue-500 hover:underline">Register</a>
        <a href="/login/" class="text-blue-500 hover:underline">Login</a>
      </div>
    </nav>

    <script>
      const token = localStorage.getItem("token");
      const navLinks = document.getElementById("navLinks");

      if (token) {
        navLinks.innerHTML = `
      <a href="/products/" class="text-blue-500 hover:underline">Products</a>
      <a href="/upload/" class="text-blue-500 hover:underline">Upload</a>
      <a href="/cart/" class="text-blue-500 hover:underline">Cart 🛒</a>
      <a href="/profile/" class="text-blue-500 hover:underline">Profile</a>
      <a href="#" onclick="logout()" class="text-red-500 hover:underline">Logout</a>

    `;
      }

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "/login/";
      }
    </script>

    <main class="p-6">{% block content %}{% endblock %}</main>
  </body>
</html>
