{% extends "base.html" %} {% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Login</h1>
  <form id="loginForm" class="space-y-4">
    <input
      name="email"
      type="email"
      placeholder="Email"
      class="w-full p-2 border rounded"
      required
    />
    <input
      name="password"
      type="password"
      placeholder="Password"
      class="w-full p-2 border rounded"
      required
    />
    <button
      class="bg-green-600 text-white w-full py-2 rounded hover:bg-green-700"
    >
      Login
    </button>
  </form>
  <p id="tokenMsg" class="mt-4 text-center text-sm font-semibold"></p>
</div>

<script>
  document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const data = Object.fromEntries(form.entries());

    const res = await fetch("/api/accounts/login/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });

    const msg = document.getElementById("tokenMsg");
    const result = await res.json();

    if (res.ok && result.access) {
      msg.innerText = "✅ Logged in! Redirecting...";
      msg.classList.add("text-green-600");
      localStorage.setItem("token", result.access);
      setTimeout(() => (window.location.href = "/products/"), 2000);
    } else {
      msg.innerText = "❌ Invalid login";
      msg.classList.add("text-red-600");
    }
  };
</script>
{% endblock %}
