{% extends "base.html" %} {% block content %}
<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">📤 Upload a Product</h1>

  <form id="uploadForm" class="space-y-4" enctype="multipart/form-data">
    <input
      type="text"
      name="name"
      placeholder="Product Name"
      class="w-full p-2 border rounded"
      required
    />
    <textarea
      name="description"
      placeholder="Description"
      class="w-full p-2 border rounded"
      required
    ></textarea>
    <input
      type="number"
      name="price"
      placeholder="Price"
      class="w-full p-2 border rounded"
      required
    />
    <input
      type="file"
      name="image"
      class="w-full p-2 border rounded bg-white"
      required
    />
    <button
      class="bg-blue-600 text-white w-full py-2 rounded hover:bg-blue-700"
    >
      Upload
    </button>
  </form>

  <p id="status" class="text-center mt-4 text-sm font-semibold"></p>
</div>

<script>
  const token = localStorage.getItem("token");
  if (!token) window.location.href = "/login/";

  const form = document.getElementById("uploadForm");
  const status = document.getElementById("status");

  form.onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(form);

    const res = await fetch("/api/products/", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token,
      },
      body: formData,
    });

    if (res.ok) {
      status.innerText = "✅ Product uploaded successfully!";
      status.classList.add("text-green-600");
      form.reset();
    } else {
      const error = await res.json();
      status.innerText =
        "❌ Upload failed: " + (error.detail || JSON.stringify(error));
      status.classList.add("text-red-600");
    }
  };
</script>
{% endblock %}
