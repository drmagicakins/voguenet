{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">🛒 My Cart</h1>
  <div id="cartItems" class="space-y-4"></div>
  <div id="cartTotal" class="text-xl font-semibold mt-6"></div>
  <button onclick="checkout()" class="mt-4 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
    Proceed to Checkout
  </button>
</div>

<script>
  function loadCart() {
    const cart = JSON.parse(localStorage.getItem("cart") || "[]");
    const cartContainer = document.getElementById("cartItems");
    const cartTotal = document.getElementById("cartTotal");

    if (cart.length === 0) {
      cartContainer.innerHTML = "<p>Your cart is empty.</p>";
      cartTotal.innerText = "";
      return;
    }

    let total = 0;
    cartContainer.innerHTML = "";

    cart.forEach((item, index) => {
      total += item.price;
      cartContainer.innerHTML += `
        <div class="flex justify-between items-center bg-gray-100 p-4 rounded">
          <div>
            <h2 class="font-bold">${item.name}</h2>
            <p>₦${item.price}</p>
          </div>
          <button onclick="removeItem(${index})" class="text-red-600 font-semibold">Remove</button>
        </div>
      `;
    });

    cartTotal.innerText = "Total: ₦" + total;
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
  }

  function checkout() {
    alert("✅ Checkout successful (simulation)");
    localStorage.removeItem("cart");
    loadCart();
  }

  loadCart();
</script>
{% endblock %}
<!-- This is the cart page where users can view their cart items, total price, and proceed to checkout. -->
