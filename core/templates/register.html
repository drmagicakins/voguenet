{% extends "base.html" %} {% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Create Account</h1>
  <form id="registerForm" class="space-y-4">
    <input
      name="username"
      placeholder="Username"
      class="w-full p-2 border rounded"
      required
    />
    <input
      name="email"
      placeholder="Email"
      type="email"
      class="w-full p-2 border rounded"
      required
    />
    <input
      name="phone"
      placeholder="Phone"
      class="w-full p-2 border rounded"
      required
    />
    <input
      name="password"
      placeholder="Password"
      type="password"
      class="w-full p-2 border rounded"
      required
    />
    <button
      class="bg-blue-600 text-white w-full py-2 rounded hover:bg-blue-700"
    >
      Register
    </button>
  </form>
  <p id="message" class="mt-4 text-center text-sm font-semibold"></p>
</div>

<script>
  document.getElementById("registerForm").onsubmit = async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const data = Object.fromEntries(form.entries());

    const res = await fetch("/api/accounts/register/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });

    const msg = document.getElementById("message");
    if (res.ok) {
      msg.innerText = "✅ Registration successful! Redirecting to login...";
      msg.classList.add("text-green-600");
      setTimeout(() => (window.location.href = "/login/"), 2000);
    } else {
      const err = await res.json();
      msg.innerText = "❌ Error: " + (err.detail || JSON.stringify(err));
      msg.classList.add("text-red-600");
    }
  };
</script>
{% endblock %}
